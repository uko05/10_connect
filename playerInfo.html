<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>原壊：コネクトバトル（プレイヤー情報）</title>
    <link rel="stylesheet" href="public/style_settings.css">
    <link rel="stylesheet" href="public/style.css">
    <script type="module" src="public/scripts/playerInfo.js" defer></script>

    <!-- Favicon -->
    <link rel="icon" href="public/scripts/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="16x16" href="public/scripts/favicon_io/favicon-16x16.png">
    <link rel="icon" sizes="32x32" href="public/scripts/favicon_io/favicon-32x32.png">
    <link rel="apple-touch-icon" href="public/scripts/favicon_io/apple-touch-icon.png">
    <link rel="icon" sizes="192x192" href="public/scripts/favicon_io/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="public/scripts/favicon_io/android-chrome-512x512.png">
</head>
<body class="simple-page">
    <main>
        <div id="playerInfoWrap" class="player-info-wrap">
            <button id="backToHubButton" class="back-btn">← モード選択に戻る</button>

            <h2 class="hub-title">プレイヤー情報</h2>

            <div class="info-item-yoko lobby-player-info">
                <div class="lobby-player-left">
                    <div class="info-row-no-bg" style="border:none; padding:0; gap:8px;">
                        <div class="label label-even">名前</div>
                        <input id="playerInfoNameInput" class="value-yoko name-input-flex" type="text" placeholder="プレイヤー名を入力" />
                        <button id="savePlayerNameButton" class="save-name-btn">保存</button>
                    </div>
                    <div id="saveNameFeedback" class="save-name-feedback"></div>
                    <div id="playerInfoRankName" class="player-rating" style="text-align:center; margin:2px 0;">---</div>
                    <div id="playerInfoRatingDisplay" class="player-rating-detail" style="text-align:center; margin:2px 0;">---</div>
                </div>
                <img id="playerInfoRankBadge" class="rank-badge" src="" alt="">
            </div>

            <div class="info-box top15">▼アチーブメント▼</div>
            <div id="achievementSummary" class="achievement-summary">---</div>

            <div class="achievement-tabs">
                <button type="button" id="achievementTab0" class="achievement-tab-btn active" data-slot="0">アチーブメント1</button>
                <button type="button" id="achievementTab1" class="achievement-tab-btn" data-slot="1">アチーブメント2</button>
            </div>

            <div id="achievementList" class="achievement-list"></div>
        </div>
    </main>

    <div id="version"></div>

    <!-- アチーブメント解放トースト -->
    <div id="ach-toast" class="ach-toast" style="display:none;">
      <div class="ach-toast-label" id="ach-toast-label">✦ アチーブメント解放！</div>
      <div class="ach-toast-name" id="ach-toast-name"></div>
      <div class="ach-toast-condition" id="ach-toast-condition"></div>
    </div>

    <footer class="legal-footer">
      © miHoYo / HoYoverse. All rights reserved. Other properties belong to their respective owners.
    </footer>

    <script src="https://uko05.github.io/TopPage00/shared/sidebar.js"></script>
</body>
</html>

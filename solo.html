<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原壊：コネクトバトル（ソロモード）</title>
    <link rel="stylesheet" href="public/style_settings.css"> <!-- 設定ダイアログのスタイル -->
    <link rel="stylesheet" href="public/style_battle.css"> <!-- バトル画面と同じ盤面スタイルを再利用 -->
    <link rel="stylesheet" href="public/style_solo.css"> <!-- ソロモード専用の追加スタイル -->
    <script type="module" src="public/scripts/soloLogic.js" defer></script>

    <!-- Favicon -->
    <link rel="icon" href="public/scripts/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="16x16" href="public/scripts/favicon_io/favicon-16x16.png">
    <link rel="icon" sizes="32x32" href="public/scripts/favicon_io/favicon-32x32.png">
    <link rel="apple-touch-icon" href="public/scripts/favicon_io/apple-touch-icon.png">
    <link rel="icon" sizes="192x192" href="public/scripts/favicon_io/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="public/scripts/favicon_io/android-chrome-512x512.png">
</head>
<body>
    <!-- ヘルプボタン -->
    <button id="helpButton" class="help-btn" data-i18n="helpBtn">あそびかた</button>

    <!-- 設定ボタン -->
    <button id="settingsButton" class="settings-btn" aria-label="設定">⚙</button>

    <!-- Help Modal -->
    <div id="helpModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div class="slider">
          <button class="slider-btn prev-btn">&lt;</button>
          <div class="slider-images">
            <img src="public/font/rule1.png" alt="説明1" class="slide active">
            <img src="public/font/rule2.png" alt="説明2" class="slide">
            <img src="public/font/rule3.png" alt="説明3" class="slide">
            <img src="public/font/rule4.png" alt="説明4" class="slide">
            <img src="public/font/rule5.png" alt="説明5" class="slide">
            <img src="public/font/rule6.png" alt="説明6" class="slide">
            <img src="public/font/rule7.png" alt="説明7" class="slide">
            <img src="public/font/rule8.png" alt="説明8" class="slide">
          </div>
          <button class="slider-btn next-btn">&gt;</button>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 data-i18n="settingsTitle">設定</h2>

        <div class="settings-section">
          <h3 data-i18n="settingsStoneColor">石の色</h3>
          <div class="color-swatch-group" id="colorSwatchGroup">
            <button type="button" class="color-swatch" data-preset-id="classic">
              <div class="color-swatch-preview">
                <span class="color-swatch-dot" style="background:#ff0000;"></span>
                <span class="color-swatch-dot" style="background:#ffff00;"></span>
              </div>
              <span data-i18n="settingsColorClassic">クラシック</span>
            </button>
            <button type="button" class="color-swatch" data-preset-id="colorsafeA">
              <div class="color-swatch-preview">
                <span class="color-swatch-dot" style="background:#0072B2;"></span>
                <span class="color-swatch-dot" style="background:#E69F00;"></span>
              </div>
              <span data-i18n="settingsColorSafeA">カラーセーフ(青/オレンジ)</span>
            </button>
            <button type="button" class="color-swatch" data-preset-id="colorsafeB">
              <div class="color-swatch-preview">
                <span class="color-swatch-dot" style="background:#009E73;"></span>
                <span class="color-swatch-dot" style="background:#CC79A7;"></span>
              </div>
              <span data-i18n="settingsColorSafeB">カラーセーフ(緑/紫)</span>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsUltIntensity">必殺技演出の強度</h3>
          <div class="intensity-radio-group" id="ultIntensityGroup">
            <label><input type="radio" name="ultIntensity" value="strong"> <span data-i18n="settingsUltStrong">強(おすすめ)</span></label>
            <label><input type="radio" name="ultIntensity" value="weak"> <span data-i18n="settingsUltWeak">弱(控えめ)</span></label>
            <label><input type="radio" name="ultIntensity" value="off"> <span data-i18n="settingsUltOff">なし</span></label>
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsVolume">音量</h3>
          <div class="settings-volume-row">
            <label for="systemvolumeSlider" data-i18n="settingsSysVol">システム音量: </label>
            <input type="range" id="systemvolumeSlider" min="0" max="1" step="0.01" value="0.2">
          </div>
          <div class="settings-volume-row">
            <label for="voicevolumeSlider" data-i18n="settingsVoiceVol">ボイス音量: </label>
            <input type="range" id="voicevolumeSlider" min="0" max="1" step="0.01" value="0.2">
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsClickMode">クリック操作</h3>
          <div class="intensity-radio-group">
            <label><input type="radio" name="clickMode" value="single"> <span data-i18n="settingsClickSingle">1クリックで石を落とす</span></label>
            <label><input type="radio" name="clickMode" value="double"> <span data-i18n="settingsClickDouble">2クリックで石を落とす（列選択→確定）</span></label>
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsLang">言語</h3>
          <div class="intensity-radio-group" id="langRadioGroup">
            <label><input type="radio" name="langSelect" value="ja"> <span data-i18n="langJa">日本語</span></label>
            <label><input type="radio" name="langSelect" value="en"> <span data-i18n="langEn">English</span></label>
          </div>
        </div>
      </div>
    </div>

    <div id="leftPane">
        <div class="player-info">
            <p id="playerName_1">あなた</p>
            <p id="player1_win">◇◇◇</p>
        </div>
        <div id="playerInfo">
            <div id="characterInfo">
                <div id="chargeGageInfo_1">
                    <div class="thumbnail-container" id="thumbnailContainerP1"></div>
                    <div class="gauge-container">
                        <div class="gauge" id="playerGauge1"></div>
                        <div class="gauge-marks">
                            <div class="mark" style="bottom: 12.5%;"></div>
                            <div class="mark" style="bottom: 25%;"></div>
                            <div class="mark" style="bottom: 37.5%;"></div>
                            <div class="mark" style="bottom: 50%;"></div>
                            <div class="mark" style="bottom: 62.5%;"></div>
                            <div class="mark" style="bottom: 75%;"></div>
                            <div class="mark" style="bottom: 87.5%;"></div>
                        </div>
                    </div>
                    <div id="chargeGage_1">
                        <p id="chargeGageMax_1">200</p>
                        <p id="chargeGageNow_1">0</p>
                        <p>0</p>
                    </div>
                </div>
                <div id="playerTitles_1" class="player-titles"></div>
                <div id="characterInfoContainer">
                    <div class="info-item-yoko">
                        <div class="label chara-label-short" data-i18n="labelChara">キャラ</div>
                        <div id="charaID_1" class="value-yoko chara-name-short"></div>
                        <div id="charge_1" class="value-yoko chara-charge-short"></div>
                    </div>
                    <div class="info-item-tate">
                        <div class="label label-even" data-i18n="labelAbility">必殺技</div>
                        <div id="Ability_1" class="value-tate abilityName"></div>
                        <div id="AbilityDetail_1" class="value-tate abilityDetail"></div>
                    </div>
                </div>
                <div id="leaveButtonContainer">
                    <button id="leaveButton" class="leave-btn" data-i18n="btnLeave">退出する</button>
                </div>
            </div>
        </div>
    </div>

    <div id="centerPanel">
        <div class="board">

            <div id="specialMoveButtonContainer" style="display: none; text-align: center;">
                <button id="specialMoveButton" class="special-move-button" data-i18n="labelAbilityBtn">必殺技発動</button>
            </div>

            <div id="cutin-container">
                <img id="cutin-image" src="">
            </div>

            <div id="turnLabel" class="turn-label"></div>
            <div id="winLabel" class="win-label"></div>

            <div id="soloResultPanel">
                <button id="soloRestartButton" class="solo-result-btn" data-i18n="btnRestart">もう一度</button>
                <button id="soloBackButton" class="solo-result-btn" data-i18n="btnBackLobby">ロビーに戻る</button>
            </div>

            <div id="boardWrap">
            <canvas id="connect4Canvas_top" width="770" height="110"></canvas>
            <canvas id="connect4Canvas" width="770" height="660"></canvas>
            <div id="timeLimitContainer" style="display:none;">
                <div id="timeLimitGauge"></div>
                <div class="gauge-tlmarks">
                    <div class="tlmark" style="left: 10%;"></div>
                    <div class="tlmark" style="left: 20%;"></div>
                    <div class="tlmark" style="left: 30%;"></div>
                    <div class="tlmark" style="left: 40%;"></div>
                    <div class="tlmark" style="left: 50%;"></div>
                    <div class="tlmark" style="left: 60%;"></div>
                    <div class="tlmark" style="left: 70%;"></div>
                    <div class="tlmark" style="left: 80%;"></div>
                    <div class="tlmark" style="left: 90%;"></div>
                </div>
            </div>
            </div>

            <div id="legal-footer">
          © miHoYo / HoYoverse. All rights reserved. Other properties belong to their respective owners.
            </div>
        </div>
    </div>

    <div id="rightPane">
        <div class="player-info">
            <p id="playerName_2">CPU</p>
            <p id="player2_win">◇◇◇</p>
        </div>
        <div id="playerInfo">
            <div id="characterInfo">
                <div id="chargeGageInfo_2">
                    <div id="chargeGage_2">
                        <p id="chargeGageMax_2">200</p>
                        <p id="chargeGageNow_2">0</p>
                        <p>0</p>
                    </div>
                    <div class="gauge-container">
                        <div class="gauge" id="playerGauge2"></div>
                        <div class="gauge-marks">
                            <div class="mark" style="bottom: 12.5%;"></div>
                            <div class="mark" style="bottom: 25%;"></div>
                            <div class="mark" style="bottom: 37.5%;"></div>
                            <div class="mark" style="bottom: 50%;"></div>
                            <div class="mark" style="bottom: 62.5%;"></div>
                            <div class="mark" style="bottom: 75%;"></div>
                            <div class="mark" style="bottom: 87.5%;"></div>
                        </div>
                    </div>
                    <div class="thumbnail-container" id="thumbnailContainerP2"></div>
                </div>
                <div id="playerTitles_2" class="player-titles"></div>
                <div id="characterInfoContainer">
                    <div class="info-item-yoko">
                        <div class="label chara-label-short" data-i18n="labelChara">キャラ</div>
                        <div id="charaID_2" class="value-yoko chara-name-short"></div>
                        <div id="charge_2" class="value-yoko chara-charge-short"></div>
                    </div>
                    <div class="info-item-tate">
                        <div class="label label-even" data-i18n="labelAbility">必殺技</div>
                        <div id="Ability_2" class="value-tate abilityName"></div>
                        <div id="AbilityDetail_2" class="value-tate abilityDetail"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="version"></div>

    <!-- アチーブメント解放トースト -->
    <div id="ach-toast" class="ach-toast" style="display:none;">
      <div class="ach-toast-label" id="ach-toast-label">✦ アチーブメント解放！</div>
      <div class="ach-toast-name" id="ach-toast-name"></div>
      <div class="ach-toast-condition" id="ach-toast-condition"></div>
    </div>

    <script src="https://uko05.github.io/TopPage00/shared/sidebar.js"></script>
</body>
</html>

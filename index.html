<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>原壊：コネクトバトル</title>
    <link rel="stylesheet" href="public/style_settings.css"> <!-- 設定ダイアログのスタイル -->
    <link rel="stylesheet" href="public/style.css"> <!-- スタイルシートのリンク -->
    <script type="module" src="public/scripts/main.js" defer></script> <!-- JavaScriptファイルの読み込み -->

    <!-- Favicon -->
    <link rel="icon" href="public/scripts/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="icon" sizes="16x16" href="public/scripts/favicon_io/favicon-16x16.png">
    <link rel="icon" sizes="32x32" href="public/scripts/favicon_io/favicon-32x32.png">

    <!-- Apple Touch Icon (for iOS) -->
    <link rel="apple-touch-icon" href="public/scripts/favicon_io/apple-touch-icon.png">

    <!-- Android Icons (for Android devices) -->
    <link rel="icon" sizes="192x192" href="public/scripts/favicon_io/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="public/scripts/favicon_io/android-chrome-512x512.png">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-09K6476DPN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-09K6476DPN');
</script>
</head>
<body>
    <header>
        <h1>原壊：コネクトバトル</h1>
    </header>

    <main>
     <!-- ヘルプボタン -->
    <button id="helpButton" class="help-btn" data-i18n="helpBtn">あそびかた</button>

    <!-- 設定ボタン -->
    <button id="settingsButton" class="settings-btn" aria-label="設定">⚙</button>

    <!-- Help Modal -->
    <div id="helpModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div class="slider">
          <!-- 左ボタン -->
          <button class="slider-btn prev-btn">&lt;</button>
          <!-- 画像表示エリア -->
          <div class="slider-images">
            <img src="public/font/rule1.png" alt="説明1" class="slide active">
            <img src="public/font/rule2.png" alt="説明2" class="slide">
            <img src="public/font/rule3.png" alt="説明3" class="slide">
            <img src="public/font/rule4.png" alt="説明4" class="slide">
            <img src="public/font/rule5.png" alt="説明5" class="slide">
            <img src="public/font/rule6.png" alt="説明6" class="slide">
            <img src="public/font/rule7.png" alt="説明7" class="slide">
            <img src="public/font/rule8.png" alt="説明8" class="slide">
          </div>
          <!-- 右ボタン -->
          <button class="slider-btn next-btn">&gt;</button>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 data-i18n="settingsTitle">設定</h2>

        <div class="settings-section">
          <h3 data-i18n="settingsStoneColor">石の色</h3>
          <div class="color-swatch-group" id="colorSwatchGroup">
            <button type="button" class="color-swatch" data-preset-id="classic">
              <div class="color-swatch-preview">
                <span class="color-swatch-dot" style="background:#ff0000;"></span>
                <span class="color-swatch-dot" style="background:#ffff00;"></span>
              </div>
              <span data-i18n="settingsColorClassic">クラシック</span>
            </button>
            <button type="button" class="color-swatch" data-preset-id="colorsafeA">
              <div class="color-swatch-preview">
                <span class="color-swatch-dot" style="background:#0072B2;"></span>
                <span class="color-swatch-dot" style="background:#E69F00;"></span>
              </div>
              <span data-i18n="settingsColorSafeA">カラーセーフ(青/オレンジ)</span>
            </button>
            <button type="button" class="color-swatch" data-preset-id="colorsafeB">
              <div class="color-swatch-preview">
                <span class="color-swatch-dot" style="background:#009E73;"></span>
                <span class="color-swatch-dot" style="background:#CC79A7;"></span>
              </div>
              <span data-i18n="settingsColorSafeB">カラーセーフ(緑/紫)</span>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsUltIntensity">必殺技演出の強度</h3>
          <div class="intensity-radio-group" id="ultIntensityGroup">
            <label><input type="radio" name="ultIntensity" value="strong"> <span data-i18n="settingsUltStrong">強(おすすめ)</span></label>
            <label><input type="radio" name="ultIntensity" value="weak"> <span data-i18n="settingsUltWeak">弱(控えめ)</span></label>
            <label><input type="radio" name="ultIntensity" value="off"> <span data-i18n="settingsUltOff">なし</span></label>
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsVolume">音量</h3>
          <div class="settings-volume-row">
            <label for="systemvolumeSlider" data-i18n="settingsSysVol">システム音量: </label>
            <input type="range" id="systemvolumeSlider" min="0" max="1" step="0.01" value="0.2">
          </div>
          <div class="settings-volume-row">
            <label for="voicevolumeSlider" data-i18n="settingsVoiceVol">ボイス音量: </label>
            <input type="range" id="voicevolumeSlider" min="0" max="1" step="0.01" value="0.2">
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="settingsLang">言語</h3>
          <div class="intensity-radio-group" id="langRadioGroup">
            <label><input type="radio" name="langSelect" value="ja"> <span data-i18n="langJa">日本語</span></label>
            <label><input type="radio" name="langSelect" value="en"> <span data-i18n="langEn">English</span></label>
          </div>
        </div>
      </div>
    </div>

     <!-- ----------------------------モーダル------------------------------------------- -->

    <!-- ② 縦画面ラベル: transform親の外に配置（position:fixedが正しく効くように） -->
    <div id="orientationLabel"></div>

    <div id="hubWrap" class="hub-wrap">
        <h2 class="hub-title" data-i18n="hubTitle">モードを選択</h2>

        <button id="goMatchButton" class="btn hub-btn hub-btn-match" data-i18n="btnMatch">マッチング対戦</button>
        <button id="goCpuButton" class="btn hub-btn hub-btn-cpu" data-i18n="btnCpu">CPU対戦</button>
        <button id="goPlayerInfoButton" class="btn hub-btn hub-btn-info" data-i18n="btnPlayerInfo">プレイヤー情報・アチーブメント</button>
    </div>
    </main>

    <div id="version"></div>

    <footer class="legal-footer">
      © miHoYo / HoYoverse. All rights reserved. Other properties belong to their respective owners.
    </footer>

    <script src="https://uko05.github.io/TopPage00/shared/sidebar.js"></script>
</body>
</html>
